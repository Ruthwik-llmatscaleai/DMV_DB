<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <!-- Background seal shape -->
  <circle cx="90" cy="90" r="82" fill="#003580"/>
  <circle cx="90" cy="90" r="75" fill="none" stroke="#FFD700" stroke-width="2.5"/>
  <circle cx="90" cy="90" r="68" fill="none" stroke="#FFD700" stroke-width="1"/>

  <!-- Star ring -->
  <g fill="#FFD700">
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(0,90,90)" opacity="0.9"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(30,90,90)" opacity="0.5"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(60,90,90)" opacity="0.3"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(90,90,90)" opacity="0.5"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(120,90,90)" opacity="0.3"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(150,90,90)" opacity="0.5"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(180,90,90)" opacity="0.9"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(210,90,90)" opacity="0.5"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(240,90,90)" opacity="0.3"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(270,90,90)" opacity="0.5"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(300,90,90)" opacity="0.3"/>
    <polygon points="90,16 92.4,23.4 100,23.4 94,28 96.4,35.4 90,31 83.6,35.4 86,28 80,23.4 87.6,23.4" transform="rotate(330,90,90)" opacity="0.5"/>
  </g>

  <!-- California Bear (simplified) -->
  <g transform="translate(58,44)">
    <!-- Bear body -->
    <ellipse cx="32" cy="52" rx="22" ry="17" fill="#8B6914"/>
    <!-- Bear head -->
    <circle cx="32" cy="32" r="14" fill="#8B6914"/>
    <!-- Bear snout -->
    <ellipse cx="32" cy="38" rx="7" ry="5" fill="#A07820"/>
    <!-- Bear nose -->
    <circle cx="32" cy="35" r="2.5" fill="#2C1810"/>
    <!-- Bear ears -->
    <circle cx="22" cy="21" r="5" fill="#8B6914"/>
    <circle cx="42" cy="21" r="5" fill="#8B6914"/>
    <circle cx="22" cy="21" r="3" fill="#7A5810"/>
    <circle cx="42" cy="21" r="3" fill="#7A5810"/>
    <!-- Bear eyes -->
    <circle cx="27" cy="29" r="2" fill="#1A0A00"/>
    <circle cx="37" cy="29" r="2" fill="#1A0A00"/>
    <circle cx="27.5" cy="28.5" r="0.7" fill="white"/>
    <circle cx="37.5" cy="28.5" r="0.7" fill="white"/>
    <!-- Bear legs -->
    <rect x="13" y="62" width="10" height="14" rx="5" fill="#8B6914"/>
    <rect x="41" y="62" width="10" height="14" rx="5" fill="#8B6914"/>
    <!-- Star on bear -->
    <polygon points="32,45 33.5,50 38,50 34.5,53 35.8,58 32,55.2 28.2,58 29.5,53 26,50 30.5,50" fill="#FFD700"/>
  </g>

  <!-- Curved text - CALIFORNIA -->
  <path id="topArc" d="M 20,90 A 70,70 0 0,1 160,90" fill="none"/>
  <text font-family="Georgia, serif" font-size="10.5" font-weight="bold" fill="#FFD700" letter-spacing="3">
    <textPath href="#topArc" startOffset="8%">CALIFORNIA</textPath>
  </text>

  <!-- Curved text - DEPARTMENT OF MOTOR VEHICLES -->
  <path id="botArc" d="M 18,95 A 72,72 0 0,0 162,95" fill="none"/>
  <text font-family="Georgia, serif" font-size="7.5" font-weight="bold" fill="#FFD700" letter-spacing="1.5">
    <textPath href="#botArc" startOffset="2%">DEPT. OF MOTOR VEHICLES</textPath>
  </text>

  <!-- Right side: Text block -->
  <rect x="188" y="20" width="116" height="140" rx="4" fill="#003580" opacity="0.1"/>

  <!-- CA text large -->
  <text x="200" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="900" fill="#003580" letter-spacing="-2">CA</text>

  <!-- Divider line -->
  <line x1="198" y1="82" x2="298" y2="82" stroke="#003580" stroke-width="2.5"/>

  <!-- DMV text -->
  <text x="200" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="900" fill="#003580" letter-spacing="4">DMV</text>

  <!-- Department text -->
  <text x="200" y="126" font-family="Arial, sans-serif" font-size="7.5" font-weight="600" fill="#555" letter-spacing="1.5">DEPARTMENT OF</text>
  <text x="200" y="137" font-family="Arial, sans-serif" font-size="7.5" font-weight="600" fill="#555" letter-spacing="1.5">MOTOR VEHICLES</text>

  <!-- State line -->
  <line x1="198" y1="144" x2="298" y2="144" stroke="#CC0000" stroke-width="2"/>
  <text x="200" y="157" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#CC0000" letter-spacing="3">CALIFORNIA</text>
</svg>
